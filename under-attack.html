<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Check | DDoS Protection</title>
    
    <!-- Cloudflare Turnstile API -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Container */
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .rays {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            transform: translate(-50%, -50%);
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(231, 76, 60, 0.1) 60deg,
                transparent 120deg,
                rgba(243, 156, 18, 0.1) 180deg,
                transparent 240deg,
                rgba(231, 76, 60, 0.1) 300deg,
                transparent 360deg
            );
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Shield/Logo */
        .shield-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border: 3px solid #e74c3c;
            border-radius: 50%;
            animation: pulse 2s ease-out infinite;
        }

        .pulse-ring:nth-child(2) { animation-delay: 0.6s; }
        .pulse-ring:nth-child(3) { animation-delay: 1.2s; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .shield {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 0 40px rgba(231, 76, 60, 0.6);
            z-index: 10;
        }

        .shield img {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }

        /* Content */
        .content {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Turnstile Container */
        .turnstile-box {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 20px 0;
            min-height: 65px;
        }

        /* Custom Turnstile styling override */
        .cf-turnstile {
            margin: 0 auto;
        }

        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #ee5a24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #888;
            font-size: 13px;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            transition: width 0.3s ease;
        }

        .progress-bar.active {
            animation: progress 3s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        /* Info Box */
        .info-box {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-row:last-child { border-bottom: none; }

        .label { color: #666; }
        .value { color: #0f0; font-weight: 600; }
        .value.pending { color: #ffaa00; }

        /* Success/Error States */
        .status-message {
            display: none;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
        }

        .status-message.success {
            display: block;
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid #27ae60;
            color: #27ae60;
        }

        .status-message.error {
            display: block;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .cf-branding {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12px;
            color: #555;
            margin-bottom: 8px;
        }

        .ray-id {
            font-family: monospace;
            font-size: 10px;
            color: #444;
        }

        /* Mobile Optimizations */
        @media (max-width: 480px) {
            .container { padding: 15px; }
            
            .shield-wrapper {
                width: 100px;
                height: 100px;
                margin-bottom: 25px;
            }

            .shield {
                width: 65px;
                height: 65px;
                font-size: 32px;
            }

            .shield img {
                width: 38px;
                height: 38px;
            }

            h1 { font-size: 20px; }
            .subtitle { font-size: 13px; margin-bottom: 20px; }
            
            .info-box {
                padding: 12px;
                font-size: 10px;
            }

            .info-row { padding: 5px 0; }
        }

        @media (max-width: 320px) {
            h1 { font-size: 18px; }
            .shield-wrapper { width: 90px; height: 90px; }
            .shield { width: 55px; height: 55px; }
        }

        /* Hidden states */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation">
        <div class="rays"></div>
    </div>

    <div class="container">
        <!-- Shield -->
        <div class="shield-wrapper">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="shield" id="shieldIcon">
                <!-- Ganti dengan logo kamu -->
                <img src="https://cdn-icons-png.flaticon.com/512/2091/2091665.png" 
                     alt="Security" 
                     onerror="this.style.display='none'; this.parentElement.innerHTML='🛡️'">
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <h1 id="mainTitle">Security Check</h1>
            <p class="subtitle" id="mainSubtitle">
                Please complete the verification below to continue
            </p>

            <!-- Loading State -->
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <span class="loading-text">Initializing security check...</span>
            </div>

            <!-- Turnstile Widget -->
            <div class="turnstile-box hidden" id="turnstileBox">
                <div class="cf-turnstile" 
                     data-sitekey="0x4AAAAAACmUJApqFJoi7W6S" 
                     data-callback="onTurnstileSuccess"
                     data-error-callback="onTurnstileError"
                     data-theme="dark"
                     data-size="normal">
                </div>
            </div>

            <!-- Progress -->
            <div class="progress-container hidden" id="progressBox">
                <div class="progress-bar active" id="progressBar"></div>
            </div>

            <!-- Status Messages -->
            <div class="status-message" id="statusMsg"></div>

            <!-- Info -->
            <div class="info-box" id="infoBox">
                <div class="info-row">
                    <span class="label">Status:</span>
                    <span class="value pending" id="statusText">Waiting...</span>
                </div>
                <div class="info-row">
                    <span class="label">IP Address:</span>
                    <span class="value" id="ipText">Detecting...</span>
                </div>
                <div class="info-row">
                    <span class="label">Ray ID:</span>
                    <span class="value" id="rayIdText">-</span>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <div class="cf-branding">
                    <span>🛡️</span>
                    <span>DDoS Protection by Cloudflare</span>
                </div>
                <div class="ray-id" id="rayIdFooter">
                    Ray ID: <span id="rayIdValue">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const VERIFY_ENDPOINT = 'verify.php'; // Ganti dengan path PHP verify kamu
        let verified = false;

        // Generate Ray ID
        function generateRayId() {
            return Array.from({length: 16}, () => 
                Math.floor(Math.random() * 16).toString(16)
            ).join('');
        }

        // Get IP
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch (e) {
                return 'Unknown';
            }
        }

        // Initialize
        async function init() {
            const rayId = generateRayId();
            const ip = await getIP();
            
            document.getElementById('rayIdText').textContent = rayId;
            document.getElementById('rayIdValue').textContent = rayId;
            document.getElementById('ipText').textContent = ip;

            // Simulate loading then show Turnstile
            setTimeout(() => {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('turnstileBox').classList.remove('hidden');
                document.getElementById('statusText').textContent = 'Verify required';
            }, 1500);
        }

        // Turnstile Success Callback
        async function onTurnstileSuccess(token) {
            if (verified) return;
            
            document.getElementById('turnstileBox').classList.add('hidden');
            document.getElementById('progressBox').classList.remove('hidden');
            document.getElementById('statusText').textContent = 'Verifying...';
            
            try {
                // Send to PHP backend
                const formData = new FormData();
                formData.append('token', token);
                
                const response = await fetch(VERIFY_ENDPOINT, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.text();
                
                if (result.trim() === 'OK') {
                    verified = true;
                    showSuccess();
                } else {
                    showError('Verification failed. Please try again.');
                }
                
            } catch (error) {
                showError('Connection error. Please refresh.');
            }
        }

        // Turnstile Error Callback
        function onTurnstileError() {
            showError('Challenge error. Please refresh the page.');
        }

        function showSuccess() {
            document.getElementById('progressBox').classList.add('hidden');
            document.getElementById('shieldIcon').innerHTML = '✓';
            document.getElementById('shieldIcon').style.background = '#27ae60';
            document.getElementById('shieldIcon').style.boxShadow = '0 0 40px rgba(39, 174, 96, 0.6)';
            
            document.getElementById('mainTitle').textContent = 'Verification Complete';
            document.getElementById('mainSubtitle').textContent = 'Redirecting you to the website...';
            document.getElementById('statusText').textContent = 'Verified ✓';
            document.getElementById('statusText').style.color = '#27ae60';
            
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.className = 'status-message success';
            statusMsg.textContent = '✓ Security check passed!';
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = '/'; // Ganti dengan URL tujuan
            }, 2000);
        }

        function showError(message) {
            document.getElementById('progressBox').classList.add('hidden');
            document.getElementById('shieldIcon').innerHTML = '✗';
            document.getElementById('shieldIcon').style.background = '#e74c3c';
            
            document.getElementById('statusText').textContent = 'Failed';
            document.getElementById('statusText').style.color = '#e74c3c';
            
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.className = 'status-message error';
            statusMsg.textContent = '✗ ' + message;
            
            // Show retry button after 3 seconds
            setTimeout(() => {
                location.reload();
            }, 3000);
        }

        // Start
        window.addEventListener('load', init);
    </script>
</body>
</html>
